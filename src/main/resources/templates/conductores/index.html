<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<div th:replace="~{fragments/layout :: app(${activeMenu}, ${pageTitle}, ~{::main})}">
    <main class="content-wrapper">
        <section class="page-heading">
            <h2>Gestion de conductores</h2>
            <p>Registro y consulta de conductores</p>
        </section>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <section class="panel-card form-panel">
            <div class="panel-heading">
                <h3 th:text="${conductorForm.idConductor == null ? 'Registrar nuevo conductor' : 'Editar conductor'}">
                    Registrar nuevo conductor
                </h3>
                <a th:if="${conductorForm.idConductor != null}" th:href="@{/conductores}" class="btn btn-outline-secondary btn-sm">
                    Cancelar edicion
                </a>
            </div>

            <form method="post"
                  th:object="${conductorForm}"
                  th:action="${conductorForm.idConductor == null} ? @{/conductores} : @{/conductores/{id}(id=${conductorForm.idConductor})}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{idConductor}">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="nombres" class="form-label">Nombres</label>
                        <input id="nombres" type="text" class="form-control" th:field="*{nombres}" placeholder="Ingrese nombres">
                    </div>
                    <div class="col-md-6">
                        <label for="apellidos" class="form-label">Apellidos</label>
                        <input id="apellidos" type="text" class="form-control" th:field="*{apellidos}" placeholder="Ingrese apellidos">
                    </div>
                    <div class="col-md-6">
                        <label for="dni" class="form-label">DNI</label>
                        <input id="dni" type="text" class="form-control" th:field="*{dni}" placeholder="Ingrese DNI">
                    </div>
                    <div class="col-md-6">
                        <label for="licencia" class="form-label">Licencia</label>
                        <input id="licencia" type="text" class="form-control" th:field="*{licencia}" placeholder="Ingrese licencia">
                    </div>
                    <div class="col-md-6">
                        <label for="telefono" class="form-label">Telefono</label>
                        <input id="telefono" type="text" class="form-control" th:field="*{telefono}" placeholder="Ingrese telefono">
                    </div>
                    <div class="col-md-6">
                        <label for="estado" class="form-label">Estado</label>
                        <select id="estado" class="form-select" th:field="*{estado}">
                            <option th:each="estadoItem : ${estados}"
                                    th:value="${estadoItem}"
                                    th:text="${estadoItem}">
                                ACTIVO
                            </option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <span th:text="${conductorForm.idConductor == null ? 'Registrar conductor' : 'Guardar cambios'}">
                            Registrar conductor
                        </span>
                    </button>
                    <a th:href="@{/conductores}" class="btn btn-outline-secondary">Limpiar</a>
                </div>
            </form>
        </section>

        <section class="panel-card table-panel">
            <div class="panel-heading">
                <h3>Conductores registrados</h3>
                <span th:text="${#lists.size(conductores)} + ' registros'">0 registros</span>
            </div>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombres</th>
                        <th>Apellidos</th>
                        <th>DNI</th>
                        <th>Licencia</th>
                        <th>Telefono</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(conductores)}">
                        <td colspan="8" class="text-center text-muted py-4">No hay conductores registrados.</td>
                    </tr>
                    <tr th:each="conductor : ${conductores}">
                        <td th:text="${conductor.idConductor}">1</td>
                        <td th:text="${conductor.nombres}">Juan</td>
                        <td th:text="${conductor.apellidos}">Perez</td>
                        <td th:text="${conductor.dni}">12345678</td>
                        <td th:text="${conductor.licencia}">A-IIb</td>
                        <td th:text="${conductor.telefono ?: '-'}">987654321</td>
                        <td>
                            <span th:class="${conductor.estado.name() == 'ACTIVO' ? 'status status-success' : 'status status-danger'}"
                                  th:text="${conductor.estado}">
                                ACTIVO
                            </span>
                        </td>
                        <td>
                            <div class="action-group">
                                <a th:href="@{/conductores/{id}/editar(id=${conductor.idConductor})}" class="btn btn-outline-primary btn-sm">
                                    Editar
                                </a>
                                <form th:action="@{/conductores/{id}/estado(id=${conductor.idConductor})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden"
                                           name="estado"
                                           th:value="${conductor.estado.name() == 'ACTIVO' ? 'INACTIVO' : 'ACTIVO'}">
                                    <button type="submit"
                                            th:class="${conductor.estado.name() == 'ACTIVO' ? 'btn btn-outline-danger btn-sm' : 'btn btn-outline-success btn-sm'}"
                                            th:text="${conductor.estado.name() == 'ACTIVO' ? 'Desactivar' : 'Activar'}">
                                        Desactivar
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
