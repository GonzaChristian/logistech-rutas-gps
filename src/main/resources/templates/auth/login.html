<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio de sesion | LOGISTECH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/logistech.css}">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-brand">
        <div class="brand-mark brand-mark-lg">GPS</div>
        <h1>LogisTech</h1>
        <p>Sistema de Trazabilidad de Rutas GPS</p>
    </section>

    <section class="login-card">
        <h2>Inicio de sesion</h2>
        <p th:if="${param.error}" class="alert alert-danger py-2">Credenciales invalidas.</p>
        <p th:if="${param.logout}" class="alert alert-success py-2">Sesion finalizada correctamente.</p>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="mb-3">
                <label for="correo" class="form-label">Usuario o correo</label>
                <input id="correo" name="correo" type="email" class="form-control" placeholder="Ingrese su usuario o correo" required autofocus>
            </div>

            <div class="mb-3">
                <label for="contrasena" class="form-label">Contrasena</label>
                <input id="contrasena" name="contrasena" type="password" class="form-control" placeholder="Ingrese su contrasena" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Iniciar sesion</button>
        </form>

        <div class="login-help">Acceso solo para personal autorizado</div>
    </section>
</main>
</body>
</html>
