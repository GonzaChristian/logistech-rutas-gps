spring.application.name=LOGISTECH

# MySQL local example. Override with DB_URL, DB_USERNAME and DB_PASSWORD if needed.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/logistech_rutas?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=8080

# Logging
logging.file.name=logs/logistech.log
logging.level.pe.edu.utp.logistech=INFO
