spring.application.name=LOGISTECH

# MySQL local example. Override with DB_URL, DB_USERNAME and DB_PASSWORD if needed.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/logistech_rutas?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=8080

# Actuator y metricas de monitoreo
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles.http.server.requests=0.95
management.metrics.distribution.percentiles-histogram.http.server.requests=true

info.app.name=${spring.application.name}
info.app.description=Sistema de trazabilidad de rutas GPS para retail
info.app.version=@project.version@

# Logging
logging.file.name=logs/logistech.log
logging.level.pe.edu.utp.logistech=INFO
